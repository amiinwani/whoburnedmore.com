name: Release

# Cuts a GitHub Release when a v* tag is pushed (e.g. `git tag v1.1.0 && git push --tags`).
# It re-runs the full gate (typecheck + tests + build) and then publishes the built
# bundle as a release artifact. There is intentionally NO npm publish step — this repo
# ships a GitHub Release only.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Sanity-check the built CLI
        run: |
          node dist/cli.js --version
          node dist/cli.js --help > /dev/null

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/cli.js
